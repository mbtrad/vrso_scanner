name: VRSO Daily Scanner

on:
  schedule:
    # 04:00 UTC = 06:00 NL tijd = ochtend voor marktopen, data vorige dag gegarandeerd beschikbaar
    - cron: '0 4 * * 2-6'

  # Handmatig starten via GitHub website (knop "Run workflow")
  workflow_dispatch:

permissions:
  contents: write   # nodig om signals.json te committen

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Installeer dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Run scanner
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
          DASHBOARD_URL:  ${{ secrets.DASHBOARD_URL }}
        run: python scanner.py

      - name: Commit signals.json
        run: |
          git config user.name  "VRSO Scanner Bot"
          git config user.email "scanner@vrso.bot"
          git add data/signals.json
          git diff --cached --quiet || git commit -m "🔍 Scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
