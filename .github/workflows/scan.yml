name: VRSO Daily Scanner

on:
  schedule:
    # 21:30 UTC = 16:30 ET (na market close)
    - cron: '30 21 * * 1-5'   # maandag t/m vrijdag

  # Handmatig starten via GitHub website (knop "Run workflow")
  workflow_dispatch:

permissions:
  contents: write   # nodig om signals.json te committen

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Installeer dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scanner
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
          DASHBOARD_URL:  ${{ secrets.DASHBOARD_URL }}
        run: python scanner.py

      - name: Commit signals.json
        run: |
          git config user.name  "VRSO Scanner Bot"
          git config user.email "scanner@vrso.bot"
          git add data/signals.json
          git diff --cached --quiet || git commit -m "🔍 Scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
