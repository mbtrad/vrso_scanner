name: VRSO Diagnose

on:
  workflow_dispatch:   # Alleen handmatig starten

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installeer dependencies
        run: pip install -r requirements.txt

      - name: Run diagnose
        run: python diagnose.py
