<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRSO Scanner</title>
<style>
  /* ── TOKENS ─────────────────────────────────────────────── */
  :root {
    --bg:        #0d0f1a;
    --surface:   #131629;
    --surface2:  #1a1f38;
    --border:    #252a45;
    --gold:      #f6c90e;
    --gold-dim:  #b8960a;
    --green:     #3ddc97;
    --green-dim: #2aa870;
    --red:       #ff6b6b;
    --red-dim:   #cc4444;
    --blue:      #6eb5ff;
    --muted:     #556080;
    --text:      #c8d3f5;
    --text-dim:  #7a8ab5;
    --new-glow:  rgba(61, 220, 151, 0.08);
    --repeat-glow: rgba(110, 181, 255, 0.05);
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-ui:   'Inter', 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); font-weight: 400; font-size: 13px; margin-left: 8px; }

  .header-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }
  .header-meta b { color: var(--text-dim); }

  /* ── TABS ───────────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 6px;
    color: var(--text-dim);
  }
  .tab.active .tab-badge { background: var(--gold); color: #000; }

  /* ── MAIN ───────────────────────────────────────────────── */
  main { padding: 16px 20px; max-width: 1400px; margin: 0 auto; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ── STATS ROW ──────────────────────────────────────────── */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    flex: 1;
    min-width: 110px;
  }
  .stat-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em; }
  .stat-card .value { font-family: var(--font-mono); font-size: 22px; font-weight: 700; margin-top: 2px; }
  .stat-card .value.gold  { color: var(--gold); }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.blue  { color: var(--blue); }

  /* ── FILTER BAR ─────────────────────────────────────────── */
  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar input, .filter-bar select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    font-family: var(--font-ui);
    outline: none;
    transition: border-color .15s;
  }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--gold); }
  .filter-bar input { min-width: 180px; }
  .filter-label { font-size: 12px; color: var(--text-dim); }

  /* ── SIGNALS TABLE ──────────────────────────────────────── */
  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    background: var(--surface2);
    color: var(--text-dim);
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .07em;
    white-space: nowrap;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--border);
  }
  thead th:hover { color: var(--gold); }
  thead th.sorted { color: var(--gold); }
  thead th .sort-icon { margin-left: 4px; opacity: .6; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  tbody tr.is-new    { background: var(--new-glow); }
  tbody tr.is-repeat { background: var(--repeat-glow); }
  tbody tr.is-new:hover    { background: rgba(61, 220, 151, 0.13); }
  tbody tr.is-repeat:hover { background: rgba(110, 181, 255, 0.10); }

  td {
    padding: 9px 12px;
    white-space: nowrap;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .ticker-cell {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ticker-name {
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
  }
  .new-badge {
    font-size: 9px;
    font-family: var(--font-ui);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: .05em;
  }
  .new-badge.new    { background: rgba(61,220,151,.18); color: var(--green); border: 1px solid rgba(61,220,151,.3); }
  .new-badge.repeat { background: rgba(110,181,255,.12); color: var(--blue); border: 1px solid rgba(110,181,255,.25); }

  .score-total {
    font-weight: 700;
    font-size: 14px;
  }
  .score-high   { color: var(--green); }
  .score-mid    { color: var(--gold); }
  .score-low    { color: var(--text-dim); }

  .price-up   { color: var(--green); }
  .price-down { color: var(--red); }
  .col-stop   { color: var(--red); }
  .col-t1     { color: var(--green); }
  .col-t2     { color: #a8ff78; }
  .col-rr     { color: var(--blue); }
  .col-rsi    { color: var(--text-dim); }
  .col-rs     { color: var(--text-dim); }

  /* Watchlist button */
  .btn-watch {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 3px 7px;
    transition: all .15s;
    line-height: 1;
  }
  .btn-watch:hover { border-color: var(--gold); color: var(--gold); }
  .btn-watch.watched { border-color: var(--gold); color: var(--gold); background: rgba(246,201,14,.1); }

  /* ── SCORE BREAKDOWN BAR ────────────────────────────────── */
  .score-bar {
    display: flex;
    gap: 3px;
    align-items: center;
    height: 16px;
  }
  .score-seg {
    height: 100%;
    border-radius: 2px;
    min-width: 4px;
    transition: opacity .2s;
  }
  .score-seg.filled   { background: var(--gold); }
  .score-seg.partial  { background: var(--gold-dim); opacity: .55; }
  .score-seg.empty    { background: var(--border); }

  /* ── DETAIL DRAWER ──────────────────────────────────────── */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 200;
    backdrop-filter: blur(2px);
  }
  .drawer-overlay.open { display: block; }

  .drawer {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: min(520px, 100vw);
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    overflow-y: auto;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }
  .drawer-ticker {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
  }
  .drawer-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .drawer-close:hover { color: var(--text); background: var(--surface2); }

  .drawer-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }

  .section-title {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .kv-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .kv { background: var(--surface2); border-radius: 6px; padding: 10px 12px; }
  .kv .k { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
  .kv .v { font-family: var(--font-mono); font-size: 15px; font-weight: 600; }

  /* Score breakdown in drawer */
  .score-breakdown {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sb-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sb-label {
    width: 90px;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .sb-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .sb-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--gold);
    transition: width .4s ease;
  }
  .sb-val {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--gold);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  .sb-max { font-size: 11px; color: var(--muted); width: 24px; flex-shrink: 0; }

  /* History table in drawer */
  .history-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 11px; }
  .history-table th {
    color: var(--text-dim);
    text-align: right;
    padding: 5px 8px;
    font-size: 10px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .history-table th:first-child { text-align: left; }
  .history-table td {
    padding: 6px 8px;
    text-align: right;
    border-bottom: 1px solid rgba(37,42,69,.5);
    color: var(--text-dim);
    white-space: nowrap;
  }
  .history-table td:first-child { text-align: left; color: var(--text-dim); }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table tr.latest td { color: var(--text); }
  .history-table .up   { color: var(--green); }
  .history-table .down { color: var(--red); }

  /* ── WATCHLIST PANEL ────────────────────────────────────── */
  .watchlist-empty {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 14px;
  }
  .watchlist-empty .icon { font-size: 40px; margin-bottom: 12px; }

  .wl-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .wl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .wl-card:hover { border-color: var(--gold); background: var(--surface2); }
  .wl-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .wl-ticker { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--gold); }
  .wl-score  { font-family: var(--font-mono); font-size: 13px; }
  .wl-history-mini { display: flex; gap: 4px; margin-top: 8px; }
  .wl-day {
    flex: 1;
    background: var(--surface2);
    border-radius: 4px;
    padding: 5px 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-align: center;
    color: var(--text-dim);
  }
  .wl-day .d-date { color: var(--muted); font-size: 9px; }
  .wl-day .d-price { font-weight: 600; color: var(--text); }
  .wl-day.active { background: rgba(246,201,14,.08); border: 1px solid rgba(246,201,14,.2); }

  .btn-remove-watch {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 3px 8px;
    transition: all .15s;
  }
  .btn-remove-watch:hover { border-color: var(--red); color: var(--red); }

  /* ── LOADING ────────────────────────────────────────────── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 60px;
    color: var(--text-dim);
  }
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── JOURNAL ────────────────────────────────────────────── */
  .trade-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .trade-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .trade-ticker {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
  }
  .trade-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .trade-levels {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 8px;
    margin-bottom: 10px;
  }
  .trade-level {
    background: var(--surface2);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .trade-level .tl-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 3px;
  }
  .trade-level .tl-val {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 600;
  }
  .trade-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .btn-outcome {
    flex: 1;
    min-width: 80px;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font-ui);
    transition: all .15s;
    text-align: center;
  }
  .btn-outcome:hover { border-color: var(--gold); color: var(--gold); }
  .btn-outcome.stop  { border-color: var(--red-dim); color: var(--red); }
  .btn-outcome.t1    { border-color: var(--green-dim); color: var(--green); }
  .btn-outcome.t2    { border-color: #a8ff78; color: #a8ff78; }
  .btn-outcome.manual { border-color: var(--blue); color: var(--blue); }
  .btn-delete-trade {
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    padding: 4px 8px;
    transition: all .15s;
  }
  .btn-delete-trade:hover { border-color: var(--red); color: var(--red); }
  .outcome-badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 5px;
    font-weight: 600;
  }
  .outcome-stop   { background: rgba(255,107,107,.15); color: var(--red); }
  .outcome-t1     { background: rgba(61,220,151,.15);  color: var(--green); }
  .outcome-t2     { background: rgba(168,255,120,.15); color: #a8ff78; }
  .outcome-manual { background: rgba(110,181,255,.15); color: var(--blue); }
  .pnl-pos { color: var(--green); font-family: var(--font-mono); font-weight: 700; }
  .pnl-neg { color: var(--red);   font-family: var(--font-mono); font-weight: 700; }

  /* Manual close input */
  .manual-close-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }
  .manual-close-row input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--font-mono);
    width: 120px;
    outline: none;
  }
  .manual-close-row input:focus { border-color: var(--gold); }
  .btn-confirm {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--gold);
    background: rgba(246,201,14,.1);
    color: var(--gold);
    cursor: pointer;
    font-size: 12px;
  }

  /* ── RESPONSIVE ─────────────────────────────────────────── */
  @media (max-width: 640px) {
    main { padding: 12px; }
    .stats-row { gap: 8px; }
    .stat-card { padding: 10px 12px; min-width: 80px; }
    .stat-card .value { font-size: 18px; }
    td, th { padding: 8px 8px; }
    .col-hide-mobile { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">VRSO <span>S&P 500 Scanner</span></div>
  <div class="header-meta" id="header-meta">Laden…</div>
</header>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" data-tab="signals">
    Signals <span class="tab-badge" id="badge-signals">–</span>
  </div>
  <div class="tab" data-tab="watchlist">
    Watchlist <span class="tab-badge" id="badge-watchlist">0</span>
  </div>
  <div class="tab" data-tab="journal">
    Trade Journal <span class="tab-badge" id="badge-journal">0</span>
  </div>
</div>

<!-- MAIN -->
<main>

  <!-- SIGNALS PANEL -->
  <div class="panel active" id="panel-signals">
    <div class="stats-row" id="stats-row"></div>

    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Zoek ticker…">
      <select id="filter-status">
        <option value="all">Alle signals</option>
        <option value="new">Alleen nieuw</option>
        <option value="repeat">Alleen herhaling</option>
      </select>
      <span class="filter-label" id="filter-count"></span>
    </div>

    <div id="signals-container">
      <div class="loading"><div class="spinner"></div> Data laden…</div>
    </div>
  </div>

  <!-- WATCHLIST PANEL -->
  <div class="panel" id="panel-watchlist">
    <div id="watchlist-container">
      <div class="watchlist-empty">
        <div class="icon">⭐</div>
        Nog geen tickers op watchlist.<br>Klik op ★ naast een ticker om toe te voegen.
      </div>
    </div>
  </div>

  <!-- JOURNAL PANEL -->
  <div class="panel" id="panel-journal">

    <!-- Stats balk -->
    <div class="stats-row" id="journal-stats"></div>

    <!-- Open trades -->
    <div style="margin-bottom:24px">
      <div style="font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:10px">
        Open trades
      </div>
      <div id="journal-open">
        <div class="watchlist-empty" style="padding:30px">
          <div class="icon">📋</div>
          Nog geen open trades.<br>Voeg een trade toe vanuit een ticker drawer.
        </div>
      </div>
    </div>

    <!-- Gesloten trades -->
    <div>
      <div style="font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:10px">
        Gesloten trades
      </div>
      <div id="journal-closed">
        <div style="color:var(--muted);font-size:13px;padding:16px 0">Nog geen gesloten trades.</div>
      </div>
    </div>

  </div>

</main>

<!-- DETAIL DRAWER -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-ticker" id="drawer-ticker">–</div>
      <div id="drawer-name" style="font-size:12px;color:var(--text-dim);margin-top:2px"></div>
    </div>
    <button class="drawer-close" id="drawer-close">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// PIVOT HTML BUILDER
// ═══════════════════════════════════════════════════════════
function buildPivotHTML(pivots, price) {
  const p = pivots || {};
  const sections = [
    { label: 'Vorige Week',  data: p.weekly  },
    { label: 'Vorige Maand', data: p.monthly },
  ];

  const levelDefs = [
    { key:'R2', type:'resist' },
    { key:'R1', type:'resist' },
    { key:'P',  type:'pivot'  },
    { key:'S1', type:'support'},
    { key:'S2', type:'support'},
  ];

  let html = '';
  sections.forEach(({ label, data }) => {
    if (!data) return;
    const rows = levelDefs.map(({ key, type }) => {
      const val  = data[key];
      const dist = ((val - price) / price * 100).toFixed(1);
      const sign = val >= price ? '+' : '';
      const color = type === 'resist' ? 'var(--red)' : type === 'support' ? 'var(--green)' : 'var(--gold)';
      const distColor = val >= price ? 'var(--red)' : 'var(--green)';
      const hl = Math.abs(val - price) / price < 0.005 ? 'background:rgba(246,201,14,.08)' : '';
      return `<tr style="${hl}">
        <td style="padding:6px 10px;color:${color};font-weight:600;font-family:var(--font-mono)">${key === 'P' ? 'Pivot' : key}</td>
        <td style="padding:6px 10px;font-family:var(--font-mono);color:var(--text)">$${val.toFixed(2)}</td>
        <td style="padding:6px 10px;font-family:var(--font-mono);color:${distColor}">${sign}${dist}%</td>
      </tr>`;
    }).join('');
    html += `
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:600">${label}</div>
      <table style="width:100%;border-collapse:collapse;background:var(--surface2);border-radius:6px;overflow:hidden">
        <thead><tr style="border-bottom:1px solid var(--border)">
          <th style="padding:5px 10px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase">Level</th>
          <th style="padding:5px 10px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase">Prijs</th>
          <th style="padding:5px 10px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase">Afstand</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });
  return html || '<div style="color:var(--muted);font-size:12px">Geen pivot data beschikbaar</div>';
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let allSignals   = [];
let watchlist    = JSON.parse(localStorage.getItem('vrso_watchlist') || '[]');
let sortKey      = 'score';
let sortDir      = -1;  // -1 = desc
let activeTab    = 'signals';
let searchQ      = '';
let filterStatus = 'all';

// Score component max values (for breakdown bars)
const COMP_MAX = {
  RSI: 2, Volume: 2, RS: 2, Body: 1, VolRising: 1, HigherLow: 1, VCP: 1
};
const COMP_LABELS = {
  RSI: 'RSI Zone', Volume: 'Vol Dry', RS: 'RS Slope',
  Body: 'Bullish Body', VolRising: 'Vol Rising', HigherLow: 'Higher Low', VCP: 'VCP'
};

// ═══════════════════════════════════════════════════════════
// DATA LADEN
// ═══════════════════════════════════════════════════════════
async function loadData() {
  try {
    // Cache bust alleen op datum, niet elke pageload — voorkomt onnodige downloads
    const today = new Date().toISOString().slice(0, 10);
    const r = await fetch('data/signals.json?d=' + today);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    allSignals = d.signals || [];

    // Header meta
    document.getElementById('header-meta').innerHTML =
      d.scan_date
        ? `<b>Laatste scan:</b> ${d.scan_time || d.scan_date}<br>` +
          `<b>Gescand:</b> ${d.total_scanned} tickers &nbsp;|&nbsp; ` +
          `<b>Signals:</b> ${d.total_signals} &nbsp;|&nbsp; ` +
          `<b>Nieuw:</b> ${d.new_signals}`
        : 'Nog geen scan uitgevoerd';

    // Stats cards
    renderStats(d);
    renderSignals();
    renderWatchlist();
    updateBadges();
  } catch(e) {
    document.getElementById('signals-container').innerHTML =
      `<div class="loading" style="flex-direction:column;gap:8px">
        <div style="font-size:24px">⚠️</div>
        <div>signals.json niet gevonden</div>
        <div style="font-size:11px;color:var(--muted)">Voer eerst de scanner uit</div>
      </div>`;
  }
}

// ═══════════════════════════════════════════════════════════
// STATS ROW
// ═══════════════════════════════════════════════════════════
function renderStats(d) {
  const avgScore = allSignals.length
    ? (allSignals.reduce((s,x) => s + x.score, 0) / allSignals.length).toFixed(1)
    : '–';
  const topScore = allSignals.length ? allSignals[0].score.toFixed(1) : '–';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="label">Totaal signals</div>
      <div class="value gold">${d.total_signals || 0}</div>
    </div>
    <div class="stat-card">
      <div class="label">Nieuw vandaag</div>
      <div class="value green">${d.new_signals || 0}</div>
    </div>
    <div class="stat-card">
      <div class="label">Gem. score</div>
      <div class="value blue">${avgScore}</div>
    </div>
    <div class="stat-card">
      <div class="label">Top score</div>
      <div class="value gold">${topScore}</div>
    </div>
    <div class="stat-card">
      <div class="label">Watchlist</div>
      <div class="value" style="color:var(--text)">${watchlist.length}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════
// SIGNALS TABLE
// ═══════════════════════════════════════════════════════════
function getFiltered() {
  return allSignals.filter(s => {
    if (searchQ && !s.ticker.includes(searchQ.toUpperCase())) return false;
    if (filterStatus === 'new'    && !s.is_new)  return false;
    if (filterStatus === 'repeat' &&  s.is_new)  return false;
    return true;
  }).sort((a,b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
    return sortDir * (av > bv ? 1 : av < bv ? -1 : 0);
  });
}

function scoreClass(s) {
  if (s >= 8) return 'score-high';
  if (s >= 6) return 'score-mid';
  return 'score-low';
}

function renderScoreBar(components) {
  const keys = Object.keys(COMP_MAX);
  return `<div class="score-bar">` +
    keys.map(k => {
      const val = components[k] || 0;
      const max = COMP_MAX[k];
      const cls = val >= max ? 'filled' : val > 0 ? 'partial' : 'empty';
      return `<div class="score-seg ${cls}" title="${COMP_LABELS[k]}: ${val}/${max}" style="flex:${max}"></div>`;
    }).join('') +
  `</div>`;
}

function renderSignals() {
  const filtered = getFiltered();
  document.getElementById('filter-count').textContent =
    `${filtered.length} van ${allSignals.length} getoond`;

  const container = document.getElementById('signals-container');

  if (!filtered.length) {
    container.innerHTML = `<div class="loading">Geen signals gevonden</div>`;
    return;
  }

  // Bouw tabel header
  const cols = [
    { key:'ticker', label:'Ticker' },
    { key:'score',  label:'Score' },
    { key:'price',  label:'Prijs' },
    { key:'stop',   label:'Stop' },
    { key:'target1',label:'T1 (+12%)' },
    { key:'target2',label:'T2 (+25%)' },
    { key:'rr',     label:'R/R', hide:true },
    { key:'rsi',    label:'RSI', hide:true },
    { key:'rs',     label:'RS%', hide:true },
    { key:'bar',    label:'Breakdown', nosort:true },
    { key:'watch',  label:'', nosort:true },
  ];

  const thHTML = cols.map(c => {
    const sorted = sortKey === c.key;
    const arrow  = sorted ? (sortDir === -1 ? ' ↓' : ' ↑') : '';
    const mob    = c.hide ? ' col-hide-mobile' : '';
    const click  = c.nosort ? '' : `onclick="setSort('${c.key}')"`;
    return `<th class="${sorted?'sorted':''}${mob}" ${click}>${c.label}<span class="sort-icon">${arrow}</span></th>`;
  }).join('');

  // Maak tabel skelet
  container.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>${thHTML}</tr></thead>
        <tbody id="signals-tbody"></tbody>
      </table>
    </div>`;

  const tbody = document.getElementById('signals-tbody');
  const fragment = document.createDocumentFragment();

  filtered.forEach(s => {
    const isWatched = watchlist.includes(s.ticker);
    const tr = document.createElement('tr');
    tr.className = s.is_new ? 'is-new' : 'is-repeat';
    tr.onclick = () => openDrawer(s.ticker);

    const badge = s.is_new
      ? `<span class="new-badge new">NIEUW</span>`
      : `<span class="new-badge repeat">DAG 2+</span>`;

    const nameHtml = s.name && s.name !== s.ticker
      ? `<div style="font-size:10px;color:var(--text-dim);font-family:var(--font-ui);margin-top:1px">${s.name}</div>`
      : '';

    tr.innerHTML = `
      <td>
        <div class="ticker-cell">
          <div><span class="ticker-name">${s.ticker}</span>${nameHtml}</div>
          ${badge}
        </div>
      </td>
      <td><span class="score-total ${scoreClass(s.score)}">${s.score.toFixed(1)}</span></td>
      <td class="price-up">$${s.price.toFixed(2)}</td>
      <td class="col-stop">$${s.stop.toFixed(2)}<br><span style="font-size:10px;color:var(--muted)">-${s.stop_pct}%</span></td>
      <td class="col-t1">$${s.target1.toFixed(2)}</td>
      <td class="col-t2">$${s.target2.toFixed(2)}</td>
      <td class="col-rr col-hide-mobile">${s.rr}:1</td>
      <td class="col-rsi col-hide-mobile">${s.rsi}</td>
      <td class="col-rs col-hide-mobile">${s.rs > 0 ? '+' : ''}${s.rs}%</td>
      <td class="col-hide-mobile">${renderScoreBar(s.components)}</td>
      <td onclick="event.stopPropagation()">
        <button class="btn-watch ${isWatched?'watched':''}"
          onclick="toggleWatch('${s.ticker}', this)"
          title="${isWatched?'Verwijder van watchlist':'Voeg toe aan watchlist'}">
          ${isWatched ? '★' : '☆'}
        </button>
      </td>`;

    fragment.appendChild(tr);
  });

  tbody.appendChild(fragment);
}

function setSort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = -1; }
  renderSignals();
}

// ═══════════════════════════════════════════════════════════
// DETAIL DRAWER
// ═══════════════════════════════════════════════════════════
function openDrawer(ticker) {
  const s = allSignals.find(x => x.ticker === ticker);
  if (!s) return;

  document.getElementById('drawer-ticker').textContent = ticker;
  const nameEl = document.getElementById('drawer-name');
  if (nameEl) nameEl.textContent = s.name && s.name !== ticker ? s.name : '';

  // Breakdown bars
  const breakdown = Object.entries(COMP_MAX).map(([k, max]) => {
    const val = s.components[k] || 0;
    const pct = (val / max) * 100;
    return `
    <div class="sb-row">
      <div class="sb-label">${COMP_LABELS[k]}</div>
      <div class="sb-bar-wrap"><div class="sb-bar-fill" style="width:${pct}%"></div></div>
      <div class="sb-val">${val}</div>
      <div class="sb-max">/${max}</div>
    </div>`;
  }).join('');

  // History table
  const histRows = (s.history || []).map((h, i) => {
    const isLatest = i === s.history.length - 1;
    const chg = i > 0 ? ((h.close - s.history[i-1].close) / s.history[i-1].close * 100) : null;
    const chgHTML = chg !== null
      ? `<span class="${chg >= 0 ? 'up' : 'down'}">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</span>`
      : '–';
    return `
    <tr class="${isLatest ? 'latest' : ''}">
      <td>${h.date}</td>
      <td>$${h.open.toFixed(2)}</td>
      <td>$${h.high.toFixed(2)}</td>
      <td>$${h.low.toFixed(2)}</td>
      <td class="${isLatest ? 'up' : ''}">$${h.close.toFixed(2)}</td>
      <td>${chgHTML}</td>
      <td>${h.rsi !== null ? h.rsi : '–'}</td>
    </tr>`;
  }).join('');

  const isWatched = watchlist.includes(ticker);

  document.getElementById('drawer-body').innerHTML = `
    <!-- Score totaal + breakdown -->
    <div>
      <div class="section-title">Score breakdown — totaal ${s.score.toFixed(1)} / 10</div>
      <div class="score-breakdown">${breakdown}</div>
    </div>

    <!-- Entry info -->
    <div>
      <div class="section-title">Entry plan</div>
      <div class="kv-grid">
        <div class="kv"><div class="k">Entry (huidig)</div><div class="v" style="color:var(--text)">$${s.price.toFixed(2)}</div></div>
        <div class="kv"><div class="k">ATR</div><div class="v" style="color:var(--text-dim)">$${s.atr.toFixed(2)}</div></div>
        <div class="kv"><div class="k">Stop loss</div><div class="v" style="color:var(--red)">$${s.stop.toFixed(2)} (-${s.stop_pct}%)</div></div>
        <div class="kv"><div class="k">R/R ratio</div><div class="v" style="color:var(--blue)">${s.rr}:1</div></div>
        <div class="kv"><div class="k">Target 1 (+12%)</div><div class="v" style="color:var(--green)">$${s.target1.toFixed(2)}</div></div>
        <div class="kv"><div class="k">Target 2 (+25%)</div><div class="v" style="color:#a8ff78">$${s.target2.toFixed(2)}</div></div>
      </div>
    </div>

    <!-- Indicators -->
    <div>
      <div class="section-title">Indicatoren</div>
      <div class="kv-grid">
        <div class="kv"><div class="k">RSI (14)</div><div class="v" style="color:var(--text-dim)">${s.rsi}</div></div>
        <div class="kv"><div class="k">RS vs SPY</div><div class="v" style="color:${s.rs >= 0 ? 'var(--green)' : 'var(--red)'}">+${s.rs}%</div></div>
        <div class="kv"><div class="k">EMA 21</div><div class="v" style="color:var(--text-dim)">$${s.ema21.toFixed(2)}</div></div>
        <div class="kv"><div class="k">EMA 50</div><div class="v" style="color:var(--text-dim)">$${s.ema50.toFixed(2)}</div></div>
        <div class="kv"><div class="k">EMA 200</div><div class="v" style="color:var(--text-dim)">$${s.ema200.toFixed(2)}</div></div>
        <div class="kv"><div class="k">Status</div><div class="v" style="color:${s.is_new ? 'var(--green)' : 'var(--blue)'}">
          ${s.is_new ? '🆕 Nieuw signal' : '🔁 Herhaling'}
        </div></div>
      </div>
    </div>

    <!-- Pivot Points -->
    <div>
      <div class="section-title">Pivot Points</div>
      ${buildPivotHTML(s.pivots, s.price)}
    </div>

    <!-- History -->
    <div>
      <div class="section-title">Laatste 5 handelsdagen</div>
      <div style="overflow-x:auto">
        <table class="history-table">
          <thead>
            <tr>
              <th>Datum</th><th>Open</th><th>High</th><th>Low</th>
              <th>Close</th><th>Chg%</th><th>RSI</th>
            </tr>
          </thead>
          <tbody>${histRows}</tbody>
        </table>
      </div>
    </div>

    <!-- Watchlist + Journal actie -->
    <div style="display:flex;flex-direction:column;gap:8px;padding-bottom:10px">
      <button
        onclick="toggleWatch('${ticker}', this); updateDrawerWatch('${ticker}', this)"
        style="width:100%;padding:11px;border-radius:8px;border:1px solid ${isWatched ? 'var(--red)' : 'var(--gold)'};
               background:${isWatched ? 'rgba(255,107,107,.08)' : 'rgba(246,201,14,.08)'};
               color:${isWatched ? 'var(--red)' : 'var(--gold)'};cursor:pointer;font-size:14px;font-weight:600;transition:all .15s"
        id="drawer-watch-btn">
        ${isWatched ? '★ Verwijder van watchlist' : '☆ Voeg toe aan watchlist'}
      </button>
      <button
        onclick="addToJournal('${ticker}')"
        style="width:100%;padding:11px;border-radius:8px;border:1px solid var(--green);
               background:rgba(61,220,151,.08);color:var(--green);
               cursor:pointer;font-size:14px;font-weight:600;transition:all .15s">
        + Voeg toe aan trade journal
      </button>
    </div>
  `;

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

function updateDrawerWatch(ticker, btn) {
  const isWatched = watchlist.includes(ticker);
  btn.textContent = isWatched ? '★ Verwijder van watchlist' : '☆ Voeg toe aan watchlist';
  btn.style.borderColor = isWatched ? 'var(--red)' : 'var(--gold)';
  btn.style.color = isWatched ? 'var(--red)' : 'var(--gold)';
  btn.style.background = isWatched ? 'rgba(255,107,107,.08)' : 'rgba(246,201,14,.08)';
}

// ═══════════════════════════════════════════════════════════
// WATCHLIST
// ═══════════════════════════════════════════════════════════
function toggleWatch(ticker, btn) {
  const idx = watchlist.indexOf(ticker);
  if (idx === -1) {
    watchlist.push(ticker);
    if (btn) { btn.textContent = '★'; btn.classList.add('watched'); }
  } else {
    watchlist.splice(idx, 1);
    if (btn) { btn.textContent = '☆'; btn.classList.remove('watched'); }
  }
  localStorage.setItem('vrso_watchlist', JSON.stringify(watchlist));
  updateBadges();
  if (activeTab === 'watchlist') renderWatchlist();
}

function renderWatchlist() {
  const cont = document.getElementById('watchlist-container');
  if (!watchlist.length) {
    cont.innerHTML = `
      <div class="watchlist-empty">
        <div class="icon">⭐</div>
        Nog geen tickers op watchlist.<br>Klik op ☆ naast een ticker om toe te voegen.
      </div>`;
    return;
  }

  const cards = watchlist.map(ticker => {
    const s = allSignals.find(x => x.ticker === ticker);
    const scoreHTML = s
      ? `<span class="wl-score ${scoreClass(s.score)}">${s.score.toFixed(1)}</span>`
      : `<span class="wl-score" style="color:var(--muted)">–</span>`;

    const histHTML = s && s.history ? s.history.map((h, i) => {
      const isLatest = i === s.history.length - 1;
      return `
      <div class="wl-day ${isLatest ? 'active' : ''}">
        <div class="d-date">${h.date.slice(5)}</div>
        <div class="d-price">$${h.close.toFixed(0)}</div>
      </div>`;
    }).join('') : '';

    return `
    <div class="wl-card" onclick="openDrawer('${ticker}')">
      <div class="wl-card-header">
        <span class="wl-ticker">${ticker}</span>
        <div style="display:flex;align-items:center;gap:10px">
          ${scoreHTML}
          <button class="btn-remove-watch"
            onclick="event.stopPropagation();removeFromWatchlist('${ticker}')"
            title="Verwijder">✕</button>
        </div>
      </div>
      ${s ? `<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">
        $${s.price.toFixed(2)} &nbsp;|&nbsp; Stop $${s.stop.toFixed(2)} &nbsp;|&nbsp; T1 $${s.target1.toFixed(2)}
      </div>` : '<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Niet in huidige scan</div>'}
      ${histHTML ? `<div class="wl-history-mini">${histHTML}</div>` : ''}
    </div>`;
  }).join('');

  cont.innerHTML = `<div class="wl-grid">${cards}</div>`;
}

function removeFromWatchlist(ticker) {
  const idx = watchlist.indexOf(ticker);
  if (idx !== -1) watchlist.splice(idx, 1);
  localStorage.setItem('vrso_watchlist', JSON.stringify(watchlist));
  updateBadges();
  renderWatchlist();
  renderSignals(); // refresh star buttons
}

function updateBadges() {
  const filtered = getFiltered();
  document.getElementById('badge-signals').textContent = filtered.length;
  document.getElementById('badge-watchlist').textContent = watchlist.length;
  document.getElementById('badge-journal').textContent = journal.filter(t => !t.closed).length;
}

// ═══════════════════════════════════════════════════════════
// TRADE JOURNAL
// ═══════════════════════════════════════════════════════════
let journal = JSON.parse(localStorage.getItem('vrso_journal') || '[]');

function saveJournal() {
  localStorage.setItem('vrso_journal', JSON.stringify(journal));
  updateBadges();
}

function addToJournal(ticker) {
  const s = allSignals.find(x => x.ticker === ticker);
  if (!s) return alert('Ticker niet in huidige scan gevonden.');

  const already = journal.find(t => t.ticker === ticker && !t.closed);
  if (already) {
    alert(`${ticker} staat al als open trade in het journal.`);
    return;
  }

  journal.push({
    id:        Date.now(),
    ticker:    ticker,
    name:      s.name || ticker,
    entry:     s.price,
    stop:      s.stop,
    target1:   s.target1,
    target2:   s.target2,
    score:     s.score,
    date:      new Date().toISOString().slice(0, 10),
    closed:    false,
    closePrice: null,
    closeDate:  null,
    outcome:    null,
    pnl:        null,
  });

  saveJournal();
  closeDrawer();

  // Switch naar journal tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="journal"]').classList.add('active');
  document.getElementById('panel-journal').classList.add('active');
  activeTab = 'journal';
  renderJournal();
}

function closeTrade(id, outcome, manualPrice) {
  const trade = journal.find(t => t.id === id);
  if (!trade) return;

  let closePrice;
  if (outcome === 'stop')   closePrice = trade.stop;
  else if (outcome === 't1') closePrice = trade.target1;
  else if (outcome === 't2') closePrice = trade.target2;
  else closePrice = parseFloat(manualPrice);

  if (isNaN(closePrice) || closePrice <= 0) return;

  trade.closed     = true;
  trade.closePrice = closePrice;
  trade.closeDate  = new Date().toISOString().slice(0, 10);
  trade.outcome    = outcome;
  trade.pnl        = ((closePrice - trade.entry) / trade.entry * 100).toFixed(2);

  saveJournal();
  renderJournal();
}

function deleteTrade(id) {
  journal = journal.filter(t => t.id !== id);
  saveJournal();
  renderJournal();
}

function showManualClose(id) {
  const row = document.getElementById('manual-row-' + id);
  if (row) row.style.display = row.style.display === 'none' ? 'flex' : 'none';
}

function confirmManualClose(id) {
  const input = document.getElementById('manual-input-' + id);
  if (!input) return;
  closeTrade(id, 'manual', input.value);
}

function renderJournal() {
  const open   = journal.filter(t => !t.closed);
  const closed = journal.filter(t =>  t.closed).reverse();

  // Stats
  const totalTrades = closed.length;
  const winners     = closed.filter(t => parseFloat(t.pnl) > 0).length;
  const winRate     = totalTrades ? ((winners / totalTrades) * 100).toFixed(0) : '–';
  const avgPnl      = totalTrades
    ? (closed.reduce((s, t) => s + parseFloat(t.pnl), 0) / totalTrades).toFixed(2)
    : '–';

  document.getElementById('journal-stats').innerHTML = `
    <div class="stat-card"><div class="label">Open trades</div><div class="value gold">${open.length}</div></div>
    <div class="stat-card"><div class="label">Gesloten</div><div class="value" style="color:var(--text)">${totalTrades}</div></div>
    <div class="stat-card"><div class="label">Win rate</div><div class="value ${winRate >= 50 ? 'green' : 'value'}">${winRate}${totalTrades ? '%' : ''}</div></div>
    <div class="stat-card"><div class="label">Gem. P&L</div>
      <div class="value ${avgPnl > 0 ? 'green' : avgPnl < 0 ? '' : ''}" style="${avgPnl < 0 ? 'color:var(--red)' : ''}">
        ${avgPnl !== '–' ? (avgPnl > 0 ? '+' : '') + avgPnl + '%' : '–'}
      </div>
    </div>`;

  // Open trades
  const openEl = document.getElementById('journal-open');
  if (!open.length) {
    openEl.innerHTML = `<div class="watchlist-empty" style="padding:30px">
      <div class="icon">📋</div>
      Nog geen open trades.<br>Voeg een trade toe vanuit een ticker drawer.
    </div>`;
  } else {
    openEl.innerHTML = open.map(t => `
    <div class="trade-card">
      <div class="trade-card-header">
        <div>
          <span class="trade-ticker">${t.ticker}</span>
          <div class="trade-meta">${t.name} &nbsp;·&nbsp; Entry: ${t.date} &nbsp;·&nbsp; Score: ${t.score}</div>
        </div>
        <button class="btn-delete-trade" onclick="deleteTrade(${t.id})">✕ Verwijder</button>
      </div>
      <div class="trade-levels">
        <div class="trade-level">
          <div class="tl-label">Entry</div>
          <div class="tl-val" style="color:var(--text)">$${t.entry.toFixed(2)}</div>
        </div>
        <div class="trade-level">
          <div class="tl-label">Stop</div>
          <div class="tl-val" style="color:var(--red)">$${t.stop.toFixed(2)}</div>
        </div>
        <div class="trade-level">
          <div class="tl-label">Target 1</div>
          <div class="tl-val" style="color:var(--green)">$${t.target1.toFixed(2)}</div>
        </div>
        <div class="trade-level">
          <div class="tl-label">Target 2</div>
          <div class="tl-val" style="color:#a8ff78">$${t.target2.toFixed(2)}</div>
        </div>
      </div>
      <div class="trade-actions">
        <button class="btn-outcome stop"  onclick="closeTrade(${t.id}, 'stop')">Stop geraakt</button>
        <button class="btn-outcome t1"    onclick="closeTrade(${t.id}, 't1')">Target 1</button>
        <button class="btn-outcome t2"    onclick="closeTrade(${t.id}, 't2')">Target 2</button>
        <button class="btn-outcome manual" onclick="showManualClose(${t.id})">Handmatig</button>
      </div>
      <div class="manual-close-row" id="manual-row-${t.id}" style="display:none">
        <input type="number" id="manual-input-${t.id}" placeholder="Slotkoers $" step="0.01">
        <button class="btn-confirm" onclick="confirmManualClose(${t.id})">Bevestig</button>
      </div>
    </div>`).join('');
  }

  // Gesloten trades
  const closedEl = document.getElementById('journal-closed');
  if (!closed.length) {
    closedEl.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:16px 0">Nog geen gesloten trades.</div>`;
  } else {
    const outcomeLabel = { stop:'Stop', t1:'Target 1', t2:'Target 2', manual:'Handmatig' };
    const outcomeCls   = { stop:'outcome-stop', t1:'outcome-t1', t2:'outcome-t2', manual:'outcome-manual' };
    closedEl.innerHTML = `
    <div class="table-wrap">
      <table style="font-size:12px">
        <thead>
          <tr>
            <th>Ticker</th><th>Entry datum</th><th>Sluit datum</th>
            <th>Entry</th><th>Slotkoers</th><th>Uitkomst</th><th>P&L</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${closed.map(t => {
            const pnl = parseFloat(t.pnl);
            const pnlClass = pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
            const pnlSign  = pnl >= 0 ? '+' : '';
            return `<tr>
              <td style="font-weight:700;color:var(--gold);font-family:var(--font-mono)">${t.ticker}</td>
              <td style="color:var(--text-dim)">${t.date}</td>
              <td style="color:var(--text-dim)">${t.closeDate}</td>
              <td style="font-family:var(--font-mono)">$${t.entry.toFixed(2)}</td>
              <td style="font-family:var(--font-mono)">$${parseFloat(t.closePrice).toFixed(2)}</td>
              <td><span class="outcome-badge ${outcomeCls[t.outcome]}">${outcomeLabel[t.outcome]}</span></td>
              <td class="${pnlClass}">${pnlSign}${t.pnl}%</td>
              <td><button class="btn-delete-trade" onclick="deleteTrade(${t.id})">✕</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }
}

// ═══════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + activeTab).classList.add('active');
    if (activeTab === 'watchlist') renderWatchlist();
    if (activeTab === 'journal')   renderJournal();
  });
});

// ═══════════════════════════════════════════════════════════
// FILTER + SEARCH
// ═══════════════════════════════════════════════════════════
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value;
  renderSignals();
  updateBadges();
});

document.getElementById('filter-status').addEventListener('change', e => {
  filterStatus = e.target.value;
  renderSignals();
  updateBadges();
});

// ═══════════════════════════════════════════════════════════
// DRAWER EVENTS
// ═══════════════════════════════════════════════════════════
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
loadData();
</script>
</body>
</html>
